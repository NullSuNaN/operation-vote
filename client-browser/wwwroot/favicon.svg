<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21232c"/>
      <stop offset="100%" stop-color="#131419"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5e62"/>
      <stop offset="100%" stop-color="#ff9966"/>
    </linearGradient>
    <linearGradient id="ticketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e5ee"/>
    </linearGradient>
    <filter id="superFloatingShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="8" dy="24" stdDeviation="20" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>

  <circle cx="256" cy="256" r="145" fill="none" stroke="#2c2e3d" stroke-width="16"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="url(#circleGrad)" stroke-width="16" stroke-dasharray="120 180" opacity="0.85"/>

  <g transform="translate(256, 256) rotate(15) translate(-70, -100)" filter="url(#superFloatingShadow)">
    <path d="M 0 10 
             C 0 4.5, 4.5 0, 10 0 
             L 130 0 
             C 135.5 0, 140 4.5, 140 10 
             L 140 50 
             A 10 10 0 0 0 140 70 
             L 140 190 
             C 140 195.5, 135.5 200, 130 200 
             L 10 200 
             C 4.5 200, 0 195.5, 0 190 
             L 0 70
             A 10 10 0 0 0 0 50 
             Z" fill="url(#ticketGrad)"/>

    <line x1="0" y1="60" x2="140" y2="60" stroke="#1c1d24" stroke-width="4" stroke-dasharray="2 6" opacity="0.25"/>

    <circle cx="35" cy="105" r="12" fill="none" stroke="url(#circleGrad)" stroke-width="5"/>
    <circle cx="35" cy="105" r="5" fill="url(#circleGrad)"/>
    <rect x="60" y="101" width="55" height="8" rx="4" fill="#1c1d24" opacity="0.3"/>

    <circle cx="35" cy="145" r="12" fill="none" stroke="#a0a5b5" stroke-width="4"/>
    <rect x="60" y="141" width="55" height="8" rx="4" fill="#1c1d24" opacity="0.15"/>
  </g>
</svg>
